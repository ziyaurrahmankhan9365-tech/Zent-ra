<!DOCTYPE html>
<html>
<head>
  <title>Login - ShopMart</title>
</head>

<body style="font-family:Arial; padding:20px;">
<div style="display:flex; align-items:center; background:#2874f0; color:white; padding:12px;">

  <span onclick="goBack()" style="font-size:20px; margin-right:10px; cursor:pointer;">⬅</span>

  <h3 style="margin:0;">Account</h3>

</div>
  
<h2>Login / Signup</h2>

<input type="email" id="email" placeholder="Enter Email"
style="display:block; margin:10px 0; padding:10px; width:100%;">

<div style="position:relative;">
  <input type="password" id="password" placeholder="Enter Password"
  style="display:block; margin:10px 0; padding:10px; width:100%;">

  <span onclick="togglePassword()" 
  style="position:absolute; right:10px; top:50%; transform:translateY(-50%); cursor:pointer;">
  👁
  </span>
</div>

<button onclick="signup()" style="padding:10px; width:100%;">Signup</button>

<button onclick="login()" style="padding:10px; width:100%; margin-top:10px;">Login</button>

<button onclick="forgotPassword()" style="padding:10px; width:100%; margin-top:10px;">
Forgot Password
</button>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script>
var firebaseConfig = {
  apiKey: "AIzaSyBPGqVgZJVGoTG-bhvtLT_zgDucNPixMB4",
  authDomain: "zentra-6d057.firebaseapp.com",
  projectId: "zentra-6d057"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => alert("Signup Successful ✅"))
    .catch(error => alert(error.message));
}

function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => {
      alert("Login Successful 🔥");
      localStorage.setItem("userEmail", email);
      window.location.href = "index.html";
    })
    .catch(error => alert(error.message));
}

function forgotPassword() {
  const email = document.getElementById("email").value;

  auth.sendPasswordResetEmail(email)
    .then(() => alert("Reset email sent 📩"))
    .catch(error => alert(error.message));
}

function goBack() {
  window.history.back();
}
    function togglePassword() {
  const pass = document.getElementById("password");

  if (pass.type === "password") {
    pass.type = "text";
  } else {
    pass.type = "password";
  }
    } 
  </script>

</body>
</html>
