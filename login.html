<!DOCTYPE html>
<html>
<head>
  <title>Login - ShopMart</title>
</head>

<body style="font-family:Arial; padding:20px;">
<div style="display:flex; align-items:center; background:#2874f0; color:white; padding:12px;">

  <span onclick="goBack()" style="font-size:20px; margin-right:10px; cursor:pointer;">⬅</span>

  <h3 style="margin:0;">Account</h3>

</div>
  


  <div id="loginBox">
  
<input type="email" id="email" placeholder="Enter Email"
style="display:block; margin:10px 0; padding:10px; width:100%;">

<div style="position:relative;">
  <input type="password" id="password" placeholder="Enter Password"
  style="display:block; margin:10px 0; padding:10px; width:100%;">

  <span onclick="togglePassword()" 
  style="position:absolute; right:10px; top:50%; transform:translateY(-50%); cursor:pointer;">
  👁
  </span>
</div>

<button onclick="signup()" style="padding:10px; width:100%;">Signup</button>

<button onclick="login()" style="padding:10px; width:100%; margin-top:10px;">Login</button>

<button onclick="forgotPassword()" style="padding:10px; width:100%; margin-top:10px;">
Forgot Password
</button>
</div>
<div id="accountSection" style="display:none;">

  <!-- TOP BOX -->
  <div style="background:#eef5ff; padding:15px; border-radius:10px; margin:10px 0; display:flex; justify-content:space-between; align-items:center;">
    
    <div>
      <h2 id="accountName" style="margin:0; font-weight:bold;"></h2>
      <p style="margin:5px 0; font-size:12px;">Get Early Access and offers</p>
    </div>

    <div style="background:white; padding:8px 12px; border-radius:20px;">
      ⚡ 0
    </div>

  </div>

  <!-- 4 BOX -->
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
    <div style="border:1px solid #ccc; padding:15px; border-radius:10px;">📦 Orders</div>
    <div style="border:1px solid #ccc; padding:15px; border-radius:10px;">❤️ Wishlist</div>
    <div style="border:1px solid #ccc; padding:15px; border-radius:10px;">🎁 Coupons</div>
    <div style="border:1px solid #ccc; padding:15px; border-radius:10px;">🎧 Help Center</div>
  </div>

</div>
  
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script>
var firebaseConfig = {
  apiKey: "AIzaSyBPGqVgZJVGoTG-bhvtLT_zgDucNPixMB4",
  authDomain: "zentra-6d057.firebaseapp.com",
  projectId: "zentra-6d057"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => alert("Signup Successful ✅"))
    .catch(error => alert(error.message));
}

function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => {
  localStorage.setItem("userEmail", email);

  // ❌ login hide
  document.getElementById("loginBox").style.display = "none";

  // ✅ account show
  document.getElementById("accountSection").style.display = "block";

  // ✅ name set
  const name = email.split("@")[0].toUpperCase();
  document.getElementById("accountName").innerText = name;
})
    .catch(error => alert(error.message));
}

function forgotPassword() {
  const email = document.getElementById("email").value;

  auth.sendPasswordResetEmail(email)
    .then(() => alert("Reset email sent 📩"))
    .catch(error => alert(error.message));
}

function goBack() {
  window.history.back();
}
 window.onload = function () {
  const user = localStorage.getItem("userEmail");

  if (user) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("accountSection").style.display = "block";

    const name = user.split("@")[0].toUpperCase();
    document.getElementById("accountName").innerText = name;
  }
};
    function togglePassword() {
  const pass = document.getElementById("password");

  if (pass.type === "password") {
    pass.type = "text";
  } else {
    pass.type = "password";
  }
    } 
  </script>

</body>
</html>
